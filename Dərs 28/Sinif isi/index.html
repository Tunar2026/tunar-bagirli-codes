<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <form action="">
        <label for="ad">Name</label>
        <input type="text" id="ad" name="ad" minlength="5" maxlength="6" placeholder="adını yaz">

        <label for="soyad">Surname</label>
        <input type="text" id="soyad" name="soyad"  minlength="7" maxlength="30" placeholder="soyadını yaz">

        <label for="age">Age</label>
        <input type="number" id="age" name="age" min="5" max="150"  required  placeholder="Age">

        <label for="pass">Password</label>
        <input type="text" id="pass" name="pass" placeholder="password yaz">

        <button type="submit"> Yadda saxla </button>
        <button type="reset"> Sıfırla</button>


    </form>
</body>
</html>
