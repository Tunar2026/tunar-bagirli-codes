<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ev isi</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="Hamısı">
    <form action="">
    

    <h2>Cancellation Request Form</h2>

    <div class="birinci">

    <label for="">Name</label>

    <input type="text" >
    <small>First name</small>

    <input type="text">
    <small>Last name </small>

    </div>

    <label for="email">Email Address</label>
    <input type="email" id="email" name="email">

    <label for="Phone numbers">Phone numbers</label>
    <input type="tel" id="Phone numbers" name="Phone numbers">

    <label for="Xidmət">Product / Service to be Canceled</label>
    <input type="text" id="Xidmət" name="Xidmət">

    <label  for="Reason for Cancellation">Reason for Cancellation</label>
    <textarea name="Cancellation" id="Cancellation" rows="5"></textarea>

    <label for="Effective from">Effective from</label>
    <input type="date" id="Effective from" name="Effective from">

    <label for="How can we contact you?">How can we contact you?</label>
    <select name="" id="">
        <option value="" selected disabled>Select</option>
        <option value="email">Email</option>
        <option value="phone">phone</option>
    </select>

    <label class="signature" for="Signature">Signature</label>
    <textarea name="Signature" id="Signature" rows="3" cols="4"></textarea>

    <button class="clear" type="reset">Clear</button>
    <button class="submit" type="submit">Submit</button>

    </form>
    </div>
    
</body>
</html>
