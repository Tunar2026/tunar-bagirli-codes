<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ev işi</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>
<body>
    <div class="container">

    <div class="image-box">
      <img src="./Nümunə foto.jpg" alt="Şəkil">
    </div>

    <div class="sağ-hamsı">

      <h1>Live.<br>Love.<br>
        <span>Decorate.</span>
      </h1>
      
      <p>
        Evinizi daha rahat və gözəl etmək üçün
        ilhamverici dekorasiya həlləri.
      </p>

      <div class="Sağ">
        <div class="icon purple"><i class="fa-solid fa-couch"></i></div>

        <div>
          <h3>Modern Design</h3>
          <span>Zövqlü və müasir interyer üslubları.</span>
        </div>
        </div>
      
     <div class="Sağ">
      <div class="icon green"><i class="fa-solid fa-leaf"></i></div>
        
        <div>
          <h3>Natural Materials</h3>
          <span>Təbii və keyfiyyətli materiallardan istifadə.</span>
        </div>
        </div>
      
      <div class="Sağ">
        <div class="icon orange"><i class="fa-solid fa-heart"></i></div>

        <div>
          <h3>Cozy Atmosphere</h3>
          <span>Rahat və isti bir ev mühiti yaradın.</span>
        </div>
        </div>
      
    </div>

  </div>
</body>
</html>
